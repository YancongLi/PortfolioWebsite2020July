name: Deploy to S3

on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: true

env:
  BUCKET: peterli-personal
  AWS_REGION: us-west-1
  # secrets aren't allowed in step `if` expressions, so surface presence here
  HAS_AWS_CREDENTIALS: ${{ secrets.AWS_ACCESS_KEY_ID != '' }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check AWS credentials are configured
        if: ${{ env.HAS_AWS_CREDENTIALS != 'true' }}
        run: |
          echo "::error::AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY secrets are not set. Add them under Settings -> Secrets and variables -> Actions (see README)."
          exit 1

      # For stronger security, swap the two secret lines below for an OIDC
      # role: create an IAM role trusting GitHub's OIDC provider and use
      # role-to-assume: arn:aws:iam::<account-id>:role/<role-name>
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Sync site to S3
        run: |
          aws s3 sync . "s3://$BUCKET" \
            --exclude ".git/*" \
            --exclude ".github/*" \
            --exclude "README.md" \
            --exclude "bucket-policy.txt" \
            --delete
